name: Release

# Cross-platform Whisperline desktop builds. Push a version tag (e.g. v0.1.0)
# — or run this workflow manually with a tag selected as the ref — and
# tauri-action compiles macOS (universal), Windows (.msi + .nsis) and Linux
# (.deb + .AppImage), then attaches them to a DRAFT GitHub Release. Review the
# draft and hit publish when you're ready — nothing goes public automatically.
#
# Builds are currently UNSIGNED. macOS users will see a Gatekeeper warning
# (right-click -> Open) and Windows users a SmartScreen prompt until signing
# certs are wired in (see the commented secrets in the build step).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo (src-tauri)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (optional — fill in to ship
          # un-warned builds). Add these as repo secrets, then uncomment:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Whisperline __VERSION__'
          releaseBody: 'Whisperline desktop builds. Free tier transcribes files up to 5:00; a Pro licence unlocks any length. See https://whisperline.aidxn.com'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
